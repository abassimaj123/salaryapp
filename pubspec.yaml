name: salary_app
description: Salary Calculator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  fl_chart: ^0.68.0
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.2.3
  in_app_purchase: ^3.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  pdf: ^3.11.1
  printing: ^5.13.1
  collection: ^1.18.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter_native_splash:
  color: "#E65100"
  android_12:
    color: "#E65100"
    icon_background_color: "#E65100"
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/icon_foreground.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
